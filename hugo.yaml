baseURL: https://actuallyrandom.com/
locale: en-us
title: Actually Random
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

minify:
  disableXML: true

# Google Analytics (GA4). PaperMod only injects this on production builds
# (i.e. not in `hugo server`), so local dev won't pollute your stats.
services:
  googleAnalytics:
    ID: G-X4VCLVLRKS

outputs:
  home:
    - HTML
    - RSS
    - JSON # required for PaperMod's client-side search

menu:
  main:
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30

params:
  env: production
  description: >-
    An outlet for actually random ideas — experiments, rabbit holes,
    and things that seemed like a good idea at 2am.
  author: Nathan Broadbent
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true

  homeInfoParams:
    Title: Actually Random 🎲
    Content: >-
      An outlet for actually random ideas — experiments, rabbit holes,
      and things that seemed like a good idea at 2am.

  socialIcons:
    - name: rss
      url: /index.xml
